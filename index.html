<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Professional</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: Tahoma, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* --- 1. ЭКРАН ЗАГРУЗКИ (BOOT) --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .xp-logo-svg { width: 300px; margin-bottom: 40px; }
        
        .loader-bar {
            width: 160px; height: 18px; border: 2px solid #999;
            border-radius: 4px; position: relative; overflow: hidden;
        }
        .loader-progress {
            width: 45px; height: 100%;
            background: linear-gradient(to right, #2244cc, #6688ff, #2244cc);
            position: absolute; animation: loading 2s infinite linear;
        }
        @keyframes loading {
            0% { left: -45px; }
            100% { left: 160px; }
        }

        /* --- 2. ЭКРАН ПРИВЕТСТВИЯ (WELCOME) --- */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #5a7edc 0%, #4a67d6 100%);
            z-index: 9999; display: none; align-items: center;
            border-top: 2px solid #fff;
        }
        .welcome-content {
            width: 100%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px; font-style: italic;
        }
        .welcome-line {
            width: 2px; height: 150px; background: rgba(255,255,255,0.3); margin: 0 40px;
        }

        /* --- 3. РАБОЧИЙ СТОЛ --- */
        #desktop {
            position: relative; width: 100%; height: calc(100% - 30px);
            background: #004EAE url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bliss_%28Windows_XP%29.png/1280px-Bliss_%28Windows_XP%29.png') no-repeat center center;
            background-size: cover;
            display: none; padding: 10px; flex-direction: column; flex-wrap: wrap; align-content: flex-start;
        }

        /* ЯРЛЫКИ */
        .shortcut {
            width: 80px; padding: 10px 5px; margin: 5px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; color: white; text-decoration: none;
            text-shadow: 1px 1px 2px #000; cursor: pointer; border: 1px solid transparent;
        }
        .shortcut:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
        .shortcut svg { width: 35px; height: 35px; margin-bottom: 5px; }

        /* ОКНА */
        .window {
            position: absolute; width: 600px; height: 400px;
            background: #ece9d8; border: 3px solid #0055E5;
            border-radius: 8px 8px 0 0; display: none; flex-direction: column;
            z-index: 100; box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
        }
        .window-header {
            height: 28px; background: linear-gradient(to bottom, #0058e6 0%, #3f8cf3 9%, #004EAE 18%, #001a4d 100%);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 8px; color: white; font-weight: bold; cursor: move;
        }
        .window-controls button {
            width: 21px; height: 21px; margin-left: 2px;
            background: #eee; border: 1px solid #fff; cursor: pointer;
        }
        .window-controls .close { background: #e81123; color: white; border-color: #701000; }
        .window-body { flex: 1; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* ПАНЕЛЬ ЗАДАЧ */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 10%, #245edb 20%, #1941a5 100%);
            display: flex; align-items: center; z-index: 9000;
        }
        #start-btn {
            height: 100%; width: 100px; background: linear-gradient(to bottom, #388e3c 0%, #4caf50 10%, #2e7d32 100%);
            border: none; border-radius: 0 10px 10px 0; color: white; font-weight: bold; font-style: italic; cursor: pointer;
        }
        #clock { margin-left: auto; color: white; padding: 0 10px; background: #0c8dea; height: 100%; display: flex; align-items: center; }

        /* МЕНЮ ПУСК */
        #start-menu {
            position: fixed; bottom: 30px; left: 0; width: 280px; height: 350px;
            background: white; border: 2px solid #245edb; display: none; flex-direction: column; z-index: 9500;
        }
        .start-header { background: #245edb; color: white; padding: 10px; font-weight: bold; }
        .start-item { padding: 10px; display: flex; align-items: center; cursor: pointer; }
        .start-item:hover { background: #316ac5; color: white; }
    </style>
</head>
<body>

        <div id="win-browser" class="window" style="top: 50px; left: 150px;">
            <div class="window-header" onmousedown="dragStart(event, 'win-browser')">
                <span>Internet Explorer</span>
                <div class="window-controls">
                    <button onclick="closeApp('win-browser')" class="close">X</button>
                </div>
            </div>
            <div class="window-body">
                <iframe src="https://www.wikipedia.org"></iframe>
            </div>
        </div>
    </div>

    <div id="start-menu">
        <div class="start-header">Administrator</div>
        <div class="start-item" onclick="openApp('win-browser')">🌐 Internet Explorer</div>
        <div class="start-item" onclick="alert('Обои изменены!')">🖼 Сменить обои</div>
    </div>

    <div id="taskbar">
        <button id="start-btn" onclick="toggleStart()">пуск</button>
        <div id="clock">12:00</div>
    </div>

    <script>
        // ЛОГИКА ЗАГРУЗКИ: Boot -> Welcome -> Desktop
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                const welcome = document.getElementById('welcome-screen');
                welcome.style.display = 'flex';
                
                setTimeout(() => {
                    welcome.style.display = 'none';
                    document.getElementById('desktop').style.display = 'flex';
                }, 2000);
            }, 3500);
        };

        function toggleStart() {
            const m = document.getElementById('start-menu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function openApp(id) {
            document.getElementById(id).style.display = 'flex';
            document.getElementById('start-menu').style.display = 'none';
        }

        function closeApp(id) {
            document.getElementById(id).style.display = 'none';
        }

        // ПЕРЕТАСКИВАНИЕ ОКНА
        function dragStart(e, id) {
            const win = document.getElementById(id);
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                win.style.left = pageX - shiftX + 'px';
                win.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        }

        // ЧАСЫ
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }, 1000);
    </script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Professional Emulator</title>
    <style>
        /* --- СБРОС И ШРИФТЫ --- */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: Tahoma, 'Segoe UI', sans-serif;
            font-size: 12px;
            overflow: hidden; /* Запрет скролла всей страницы */
            -webkit-user-select: none; user-select: none; /* Запрет выделения текста */
        }

        /* --- ЭКРАН ЗАГРУЗКИ (BOOT SCREEN) --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        #boot-logo { width: 250px; margin-bottom: 40px; }
        #boot-loader {
            width: 150px; height: 15px; border: 2px solid #aaa;
            border-radius: 4px; overflow: hidden; position: relative;
        }
        #boot-progress {
            width: 40px; height: 100%; background-color: #3366cc;
            position: absolute; animation: moveLoader 2s infinite linear;
            box-shadow: 0 0 5px #3366cc;
        }
        @keyframes moveLoader {
            0% { left: -40px; }
            100% { left: 150px; }
        }

        /* --- РАБОЧИЙ СТОЛ --- */
        #desktop {
            position: relative; width: 100%; height: calc(100% - 30px);
            /* Дефолтные обои Bliss */
            background: #004EAE url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bliss_%28Windows_XP%29.png/1280px-Bliss_%28Windows_XP%29.png') no-repeat center center;
            background-size: cover;
            padding: 10px;
            display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start;
        }

        /* --- ЯРЛЫКИ НА РАБОЧЕМ СТОЛЕ --- */
        .shortcut {
            width: 75px; height: 75px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; text-decoration: none;
            cursor: pointer; margin-bottom: 15px; border: 1px solid transparent;
        }
        .shortcut:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .shortcut:active {
            background-color: rgba(0, 85, 229, 0.3);
            border: 1px solid rgba(0, 85, 229, 0.5);
        }
        .shortcut-icon { width: 32px; height: 32px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }
        .shortcut-icon svg { width: 100%; height: 100%; }
        .shortcut-label {
            font-size: 11px; text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
            word-wrap: break-word; max-width: 100%;
        }

        /* --- ОКНА (WINDOWS) --- */
        .window {
            position: absolute; width: 600px; height: 400px;
            background: #ece9d8; border: 3px solid #0055E5;
            border-radius: 7px 7px 0 0; box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            min-width: 200px; min-height: 100px;
            z-index: 10;
        }
        /* Синий градиент заголовка */
        .window-header {
            height: 25px; background: linear-gradient(to bottom, #0058e6 0%, #3f8cf3 9%, #004EAE 18%, #004EAE 92%, #001a4d 100%);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5px; color: white; font-weight: bold; cursor: move;
        }
        .window-title { display: flex; align-items: center; gap: 5px; pointer-events: none; }
        .window-header-icon { width: 16px; height: 16px; }
        
        .window-controls { display: flex; gap: 2px; }
        .window-controls button {
            width: 21px; height: 21px; border: 1px solid #fff; border-radius: 2px;
            cursor: pointer; font-weight: bold; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(210,210,210,1) 100%);
        }
        .window-controls button:hover { filter: brightness(1.1); }
        .window-controls button.close {
            background: linear-gradient(180deg, rgba(255,165,140,1) 0%, rgba(200,50,30,1) 100%);
            color: white; border-color: #701000;
        }

        .window-body { flex: 1; overflow: auto; padding: 2px; position: relative; }

        /* --- БРАУЗЕР IE --- */
        .ie-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .ie-toolbar {
            height: 35px; background-color: #ece9d8; border-bottom: 1px solid #999;
            display: flex; align-items: center; padding: 0 5px; gap: 5px;
        }
        .ie-toolbar input { flex: 1; height: 22px; border: 1px solid #7f9db9; padding: 0 5px; }
        .ie-toolbar button { height: 22px; cursor: pointer; }
        .ie-iframe { flex: 1; border: 1px solid #999; background: white; }

        /* --- НАСТРОЙКИ ОБОЕВ --- */
        .wall-selector { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .wall-option {
            display: flex; align-items: center; gap: 10px; padding: 5px;
            border: 1px solid #ccc; cursor: pointer; background: white;
        }
        .wall-option:hover { background-color: #e0f0ff; }
        .wall-preview { width: 60px; height: 40px; border: 1px solid #000; background-size: cover; }

        /* --- ПАНЕЛЬ ЗАДАЧ (TASKBAR) --- */
        #taskbar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            border-top: 1px solid #1a3b80;
            display: flex; align-items: center; z-index: 9000;
        }

        /* КНОПКА ПУСК */
        #start-button {
            height: 100%; width: 100px;
            background: linear-gradient(to bottom, #388e3c 0%, #4caf50 10%, #388e3c 20%, #388e3c 90%, #2e7d32 100%);
            border: none; border-top-right-radius: 10px; border-bottom-right-radius: 10px;
            color: white; font-weight: bold; font-size: 15px; font-style: italic;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }
        #start-button:hover { filter: brightness(1.1); }
        #start-button:active { background: linear-gradient(to bottom, #2e7d32 0%, #388e3c 100%); }

        /* ТРЕЙ (ЧАСЫ) */
        #system-tray {
            margin-left: auto; height: 100%; padding: 0 10px;
            background: linear-gradient(to bottom, #0c8dea 0%, #245edb 100%);
            border-left: 1px solid #1a3b80;
            display: flex; align-items: center; color: white;
        }

        /* --- МЕНЮ ПУСК (START MENU) --- */
        #start-menu {
            position: fixed; bottom: 30px; left: 0; width: 300px; height: 400px;
            background-color: white; border: 2px solid #245edb; border-radius: 5px 5px 0 0;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.3);
            display: none; flex-direction: column; z-index: 8999;
        }
        #start-header {
            height: 50px; background: linear-gradient(to bottom, #3f8cf3 0%, #245edb 100%);
            display: flex; align-items: center; padding: 0 10px; color: white; font-weight: bold; font-size: 14px;
        }
        #start-header-avatar { width: 34px; height: 34px; border: 2px solid white; border-radius: 3px; background-color: #ff9900; margin-right: 10px; }
        
        #start-content { flex: 1; display: flex; background-color: #dbeafe; }
        #start-left { width: 50%; background: white; border-right: 1px solid #b5d3ff; padding: 5px 0; }
        #start-right { width: 50%; padding: 5px 0; }
        
        .start-item {
            display: flex; align-items: center; padding: 5px 10px; cursor: pointer; color: #000;
        }
        .start-item:hover { background-color: #316ac5; color: white; }
        .start-icon { width: 24px; height: 24px; margin-right: 10px; display: flex; align-items: center; justify-content: center; }
        .start-icon svg, .start-icon img { width: 100%; height: 100%; }

        #start-footer {
            height: 40px; background-color: #dbeafe; border-top: 1px solid #b5d3ff;
            display: flex; justify-content: flex-end; align-items: center; padding: 0 10px; gap: 10px;
        }
        .logoff-btn {
            background: #eee; border: 1px solid #7f9db9; padding: 3px 8px; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .logoff-btn:hover { background: #fff; }

        /* Вспомогательные классы */
        .hidden { display: none !important; }
    </style>
</head>

            пуск
        </button>

    <script>
        // --- 1. ЛОГИКА ЗАГРУЗКИ (BOOT) ---
        window.addEventListener('load', function() {
            // Симулируем загрузку 3 секунды
            setTimeout(function() {
                const bootScreen = document.getElementById('boot-screen');
                bootScreen.style.opacity = '0';
                setTimeout(() => bootScreen.classList.add('hidden'), 500);
            }, 3000);
        });

        // --- 2. ЛОГИКА МЕНЮ ПУСК ---
        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            const isVisible = menu.style.display === 'flex';
            menu.style.display = isVisible ? 'none' : 'flex';
        }

        // Закрывать меню при клике по рабочему столу
        document.getElementById('desktop').addEventListener('click', function(e) {
            // Если кликнули не по кнопке Пуск, закрываем меню
            if (!e.target.closest('#start-button')) {
                document.getElementById('start-menu').style.display = 'none';
            }
        });

        // --- 3. ЛОГИКА ОКОН (OPEN/CLOSE/FOCUS) ---
        let highestZ = 100;

        function openWindow(id) {
            const win = document.getElementById(id);
            win.classList.remove('hidden');
            bringToFront(win);
            document.getElementById('start-menu').style.display = 'none'; // Скрыть Пуск
        }

        function closeWindow(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function bringToFront(win) {
            highestZ++;
            win.style.zindex = highestZ;
        }

        // --- 4. ЛОГИКА DRAG & DROP (ПЕРЕТАСКИВАНИЕ) ---
        // Делаем все элементы с классом .window перетаскиваемыми за .window-header
        const windows = document.querySelectorAll('.window');
        
        windows.forEach(win => {
            const header = win.querySelector('.window-header');
            let isDragging = false;
            let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

            // Определяем начальную позицию из style (если есть)
            if (win.style.left) xOffset = parseInt(win.style.left);
            if (win.style.top) yOffset = parseInt(win.style.top);

            header.addEventListener('mousedown', dragStart);
            win.addEventListener('mousedown', () => bringToFront(win)); // Фокус при клике на окно

            function dragStart(e) {
                // Разрешить тащить только если кликнули по заголовку, а не по кнопкам
                if (e.target.closest('.window-controls')) return;

                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                isDragging = true;
                
                // Добавляем слушатели на document, чтобы мышь не "срывалась"
                document.addEventListener('mousemove', drag);
                document.addEventListener('mouseup', dragEnd);
            }

            function drag(e) {
                if (isDragging) {
                    e.preventDefault();
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    
                    // Ограничение, чтобы окно не уходило за верх
                    if (currentY < 0) currentY = 0;

                    win.style.left = currentX + "px";
                    win.style.top = currentY + "px";
                }
            }

            function dragEnd() {
                isDragging = false;
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('mouseup', dragEnd);
            }
        });

        // --- 5. ЛОГИКА БРАУЗЕРА IE ---
        function loadIframeUrl() {
            const input = document.getElementById('ie-url');
            const frame = document.getElementById('ie-frame');
            let url = input.value;

            // Добавляем http если нет
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
                input.value = url;
            }

            // Примечание: Многие сайты (Google, VK) запрещают встраивание в iframe (X-Frame-Options)
            // Wikipedia работает.
            frame.src = url;
        }

        // --- 6. СМЕНА ОБОЕВ ---
        function setWallpaper(name) {
            const desktop = document.getElementById('desktop');
            const urls = {
                'bliss': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bliss_%28Windows_XP%29.png/1280px-Bliss_%28Windows_XP%29.png',
                'autumn': 'https://static1.srcdn.com/wordpress/wp-content/uploads/2023/11/windows-xp-autumn-wallpaper.jpg?q=50&fit=crop&w=825&dpr=1.5',
                'azul': 'https://static1.srcdn.com/wordpress/wp-content/uploads/2023/11/windows-xp-azul-wallpaper.jpg?q=50&fit=crop&w=825&dpr=1.5'
            };
            
            if (urls[name]) {
                desktop.style.backgroundImage = `url('${urls[name]}')`;
            }
        }

        // --- 7. ЧАСЫ В ТРЕЕ ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Сразу установить

    </script>
